<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saverio Menu - Gestione</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f8f9fa; color: #333; }
        
        /* Header con tasto impostazioni in alto a destra */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 600px;
            margin: 0 auto 20px auto;
        }

        .menu-container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        h2 { margin: 0; color: #d9534f; }

        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            padding-bottom: 10px; 
            border-bottom: 1px solid #eee; 
        }

        .item span { font-weight: 500; font-size: 1.1em; }

        input[type="number"] { 
            width: 80px; 
            padding: 6px; 
            border-radius: 6px; 
            border: 1px solid transparent; 
            text-align: right; 
            font-weight: bold;
            background: #f1f1f1;
        }

        input:enabled { 
            border: 1px solid #007bff; 
            background: white; 
        }

        input:disabled { color: #000; }

        .controls { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        
        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            transition: 0.3s;
        }

        .btn-settings { background-color: #6c757d; color: white; font-size: 0.9em; }
        .btn-save { background-color: #28a745; color: white; display: none; width: 100%; font-size: 1.1em; }
        
        .admin-label { 
            background-color: #fcf8e3;
            color: #8a6d3b;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #faebcc;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>🍕 Saverio Menu</h2>
    <button id="btn-login" class="btn-settings" onclick="chiediAccesso()">⚙️ Modifica</button>
</div>

<div class="menu-container">
    <div id="admin-status" class="admin-label">🔓 MODALITÀ MODIFICA ATTIVA</div>
    
    <div id="menu-items">
        <p style="text-align: center;">Caricamento menu...</p>
    </div>

    <div class="controls">
        <button id="btn-save" class="btn-save" onclick="salvaPrezziSuFirebase()">💾 SALVA NUOVI PREZZI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- CONFIGURAZIONE FIREBASE (Dati dal tuo screenshot) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCuiLRkkFHtUE7Szm343zl-4Gh08zdjqOA",
        authDomain: "saverio-menu.firebaseapp.com",
        projectId: "saverio-menu",
        storageBucket: "saverio-menu.firebasestorage.app",
        messagingSenderId: "351944399414",
        appId: "1:351944399414:web:89ca914f6e673b93751697",
        databaseURL: "https://saverio-menu-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const prezziRef = ref(db, 'menu/prezzi');

    const PASSWORD_ADMIN = "Believeit92!"; 

    // 1. CARICARE I PREZZI IN TEMPO REALE
    onValue(prezziRef, (snapshot) => {
        const data = snapshot.val() || { "Margherita": 7, "Diavola": 8.5, "Acqua": 2 };
        const container = document.getElementById('menu-items');
        container.innerHTML = ""; 

        for (let piatto in data) {
            container.innerHTML += `
                <div class="item">
                    <span>${piatto}</span>
                    <div>
                        <input type="number" step="0.10" class="input-prezzo" data-piatto="${piatto}" value="${data[piatto]}" disabled> €
                    </div>
                </div>
            `;
        }
    });

    // 2. FUNZIONE DI ACCESSO
    window.chiediAccesso = function() {
        const pass = prompt("Inserisci password amministratore:");
        if (pass === PASSWORD_ADMIN) {
            document.querySelectorAll('.input-prezzo').forEach(input => input.disabled = false);
            document.getElementById('btn-save').style.display = 'block';
            document.getElementById('admin-status').style.display = 'block';
            document.getElementById('btn-login').style.display = 'none';
        } else {
            alert("Password errata!");
        }
    }

    // 3. SALVATAGGIO SU FIREBASE
    window.salvaPrezziSuFirebase = function() {
        const inputs = document.querySelectorAll('.input-prezzo');
        const nuoviPrezzi = {};

        inputs.forEach(input => {
            const nomePiatto = input.getAttribute('data-piatto');
            nuoviPrezzi[nomePiatto] = parseFloat(input.value);
        });

        set(ref(db, 'menu/prezzi'), nuoviPrezzi)
            .then(() => {
                alert("Prezzi aggiornati e salvati online!");
                location.reload(); 
            })
            .catch((error) => {
                alert("Errore nel salvataggio: " + error.message);
            });
    }
</script>

</body>
</html>
